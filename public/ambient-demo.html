<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>bop · ambient audio demo</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    background: radial-gradient(120% 120% at 50% 0%, #1b2436 0%, #0b0f18 60%);
    color: #dfe6f2; font: 15px/1.5 ui-sans-serif, system-ui, sans-serif;
  }
  .card {
    width: min(420px, 92vw); padding: 28px; border-radius: 20px;
    background: rgba(255,255,255,0.045); border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(8px);
  }
  h1 { font-size: 17px; margin: 0 0 4px; letter-spacing: 0.02em; }
  p.sub { margin: 0 0 20px; color: #8fa0bb; font-size: 13px; }
  .row { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  button {
    flex: 1; min-width: 110px; padding: 12px 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.07); color: inherit; font: inherit; cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  button:hover { background: rgba(255,255,255,0.12); }
  button.on { background: #3b5bdb; border-color: #4c6ef5; }
  label { display: flex; align-items: center; gap: 10px; font-size: 13px; color: #8fa0bb; margin-top: 8px; }
  input[type=range] { flex: 1; accent-color: #4c6ef5; }
  .viz { display: flex; gap: 4px; height: 34px; align-items: flex-end; margin: 18px 0 6px; }
  .viz div { flex: 1; background: #4c6ef5; border-radius: 3px 3px 0 0; height: 4px; opacity: 0.7; transition: height 80ms linear; }
</style>
</head>
<body>
<div class="card">
  <h1>bop · generative ambience</h1>
  <p class="sub">pad drone + pentatonic plucks + breath noise · 60 BPM pulse layer for active steps</p>
  <div class="row">
    <button id="power">▶ start</button>
    <button id="pulse">pulse layer</button>
    <button id="chime">step chime ✦</button>
  </div>
  <label>volume <input id="vol" type="range" min="0" max="1" step="0.01" value="0.8" /></label>
  <div class="viz" id="viz"></div>
</div>

<script>
// ---- generative ambient engine (vanilla JS preview of future src/audio module) ----
// Key: A major pentatonic. Pad drones a chord from a diatonic pool and drifts
// between chords; plucks pick random pentatonic notes on a loose 60 BPM grid.

const A2 = 110;
const st = s => A2 * Math.pow(2, s / 12);            // semitones above A2
const PENTA = [0, 2, 4, 7, 9];                        // A B C# E F#
// chord pool as semitone stacks: A(add9), F#m7, Dmaj7, Esus
const CHORDS = [
  [0, 7, 14, 16],
  [-3, 4, 9, 12],
  [5, 12, 16, 21],
  [7, 14, 17, 19],
];

let ctx, master, comp, analyser;
let padOscs = [], padGain, noiseGain, pulseGain, delaySend;
let running = false, pulseOn = false;
let schedTimer = null, nextBeat = 0, beatCount = 0, chordIdx = 0;

const BPM = 60, BEAT = 60 / BPM;

function init() {
  ctx = new (window.AudioContext || window.webkitAudioContext)();
  comp = ctx.createDynamicsCompressor();
  comp.threshold.value = -18; comp.ratio.value = 4;
  master = ctx.createGain();
  master.gain.value = +document.getElementById('vol').value * 0.7;
  analyser = ctx.createAnalyser(); analyser.fftSize = 64;
  master.connect(comp).connect(analyser).connect(ctx.destination);

  // shared feedback delay (dotted-8th-ish shimmer for plucks/chime)
  const delay = ctx.createDelay(2); delay.delayTime.value = BEAT * 0.75;
  const fb = ctx.createGain(); fb.gain.value = 0.35;
  const delayMix = ctx.createGain(); delayMix.gain.value = 0.4;
  delay.connect(fb).connect(delay);
  delay.connect(delayMix).connect(master);
  delaySend = delay;

  // ---- pad: detuned triangles through a slow-breathing lowpass ----
  padGain = ctx.createGain(); padGain.gain.value = 0;
  const padFilter = ctx.createBiquadFilter();
  padFilter.type = 'lowpass'; padFilter.frequency.value = 700; padFilter.Q.value = 0.4;
  const lfo = ctx.createOscillator(); lfo.frequency.value = 0.06;   // ~16s breath
  const lfoAmt = ctx.createGain(); lfoAmt.gain.value = 320;
  lfo.connect(lfoAmt).connect(padFilter.frequency); lfo.start();
  padGain.connect(padFilter).connect(master);

  const chord = CHORDS[0];
  for (let i = 0; i < chord.length; i++) {
    for (const det of [-4, 4]) {                      // two detuned voices per note
      const o = ctx.createOscillator();
      o.type = 'triangle'; o.frequency.value = st(chord[i]); o.detune.value = det;
      const g = ctx.createGain(); g.gain.value = 0.055;
      o.connect(g).connect(padGain); o.start();
      padOscs.push(o);
    }
  }
  padGain.gain.linearRampToValueAtTime(1, ctx.currentTime + 4);   // slow fade-in

  // ---- breath noise: filtered pink-ish noise, slow swells ----
  const nbuf = ctx.createBuffer(1, ctx.sampleRate * 4, ctx.sampleRate);
  const d = nbuf.getChannelData(0);
  let b0 = 0;
  for (let i = 0; i < d.length; i++) {                // cheap pink noise
    b0 = 0.985 * b0 + 0.015 * (Math.random() * 2 - 1);
    d[i] = b0 * 3;
  }
  const noise = ctx.createBufferSource(); noise.buffer = nbuf; noise.loop = true;
  const nf = ctx.createBiquadFilter(); nf.type = 'bandpass'; nf.frequency.value = 900; nf.Q.value = 0.6;
  noiseGain = ctx.createGain(); noiseGain.gain.value = 0.012;
  const nlfo = ctx.createOscillator(); nlfo.frequency.value = 0.045;
  const nlfoAmt = ctx.createGain(); nlfoAmt.gain.value = 0.01;
  nlfo.connect(nlfoAmt).connect(noiseGain.gain); nlfo.start();
  noise.connect(nf).connect(noiseGain).connect(master); noise.start();

  // ---- pulse layer bus (thump + tick), faded by game state ----
  pulseGain = ctx.createGain(); pulseGain.gain.value = 0;
  pulseGain.connect(master);

  nextBeat = ctx.currentTime + 0.2;
  schedTimer = setInterval(schedule, 100);
  drawViz();
}

// lookahead scheduler on a 60 BPM grid, half-beat resolution
function schedule() {
  while (nextBeat < ctx.currentTime + 0.35) {
    const t = nextBeat;
    const halfBeat = beatCount % 1 !== 0;

    if (!halfBeat) {
      thump(t);
      if (beatCount % 20 === 0 && beatCount > 0) driftChord();
    } else {
      tick(t);
    }
    // generative plucks: sparse, off the grid feel via jitter
    if (Math.random() < 0.26) {
      const semis = PENTA[Math.floor(Math.random() * PENTA.length)]
        + 12 * (2 + Math.floor(Math.random() * 2));   // octaves 4-5
      pluck(st(semis), t + Math.random() * 0.12);
    }
    nextBeat += BEAT / 2;
    beatCount += 0.5;
  }
}

function pluck(freq, t, vel = 0.16) {
  const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = freq;
  const o2 = ctx.createOscillator(); o2.type = 'sine'; o2.frequency.value = freq * 2;
  const g = ctx.createGain(); g.gain.value = 0;
  const g2 = ctx.createGain(); g2.gain.value = 0.25;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vel, t + 0.015);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 2.2);
  o.connect(g); o2.connect(g2).connect(g);
  g.connect(master); g.connect(delaySend);
  o.start(t); o2.start(t); o.stop(t + 2.4); o2.stop(t + 2.4);
}

function thump(t) {
  const o = ctx.createOscillator(); o.frequency.setValueAtTime(120, t);
  o.frequency.exponentialRampToValueAtTime(45, t + 0.25);
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.5, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
  o.connect(g).connect(pulseGain); o.start(t); o.stop(t + 0.35);
}

function tick(t) {
  const o = ctx.createOscillator(); o.type = 'triangle'; o.frequency.value = 2400;
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.05, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
  o.connect(g).connect(pulseGain); o.start(t); o.stop(t + 0.08);
}

// glide pad oscillators to the next chord in the pool
function driftChord() {
  chordIdx = (chordIdx + 1 + Math.floor(Math.random() * 2)) % CHORDS.length;
  const chord = CHORDS[chordIdx];
  padOscs.forEach((o, i) => {
    const target = st(chord[Math.floor(i / 2) % chord.length]);
    o.frequency.exponentialRampToValueAtTime(target, ctx.currentTime + 6);
  });
}

// step-completion chime: two rising in-key notes with shimmer
function chime() {
  if (!running) return;
  const t = ctx.currentTime + 0.02;
  pluck(st(16 + 12), t, 0.22);          // C#5
  pluck(st(21 + 12), t + 0.18, 0.26);   // F#5
  pluck(st(24 + 12), t + 0.36, 0.2);    // A5
}

// ---- UI ----
const powerBtn = document.getElementById('power');
const pulseBtn = document.getElementById('pulse');
powerBtn.onclick = () => {
  if (!running) {
    if (!ctx) init(); else ctx.resume();
    running = true; powerBtn.textContent = '■ stop'; powerBtn.classList.add('on');
  } else {
    ctx.suspend();
    running = false; powerBtn.textContent = '▶ start'; powerBtn.classList.remove('on');
  }
};
pulseBtn.onclick = () => {
  if (!ctx) return;
  pulseOn = !pulseOn;
  pulseBtn.classList.toggle('on', pulseOn);
  const t = ctx.currentTime;
  pulseGain.gain.cancelScheduledValues(t);
  pulseGain.gain.setValueAtTime(pulseGain.gain.value, t);
  pulseGain.gain.linearRampToValueAtTime(pulseOn ? 0.45 : 0, t + 1.5);
};
document.getElementById('chime').onclick = chime;
document.getElementById('vol').oninput = e => {
  if (master) master.gain.value = +e.target.value * 0.7;
};

// tiny level visualizer
const viz = document.getElementById('viz');
const bars = Array.from({ length: 24 }, () => viz.appendChild(document.createElement('div')));
function drawViz() {
  const data = new Uint8Array(analyser.frequencyBinCount);
  (function frame() {
    analyser.getByteFrequencyData(data);
    bars.forEach((b, i) => { b.style.height = 4 + (data[i] / 255) * 30 + 'px'; });
    requestAnimationFrame(frame);
  })();
}
</script>
</body>
</html>
